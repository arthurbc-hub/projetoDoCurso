<!DOCTYPE html>
<html>
    <head>
        <link rel="stylesheet" href="../css/reset.css"/>
        <link rel="stylesheet" href="../css/color.css"/>
        <link rel="stylesheet" href="../css/dashboard.css"/>
        <title>Dashboard</title>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
    </head>
    <body>
        <header id="header">
            <h1 id="tituloDashboard">Sistema de Estoque</h1>
            <nav>
                <ul>
                    <li><a href="#">Início</a></li>
                    <li><a href="#">Gerenciamento</a></li>
                </ul>
            </nav>
        </header>

        <main>
            <section id="resumoEstoque">
                <div class="card-resumo">
                    <h2 class="titulo-card">Entrada</h2>
                    <p class="valor-card">100</p>
                </div>
                <div class="card-resumo">
                    <h2 class="titulo-card">Saída</h2>
                    <p class="valor-card">80</p>
                </div>
                <div class="card-resumo">
                    <h2 class="titulo-card">Total</h2>
                    <p class="valor-card">20</p>
                </div>
            </section>

            <!-- FILTROS -->
            <section id="filtro">
                <div class="grupo-filtro">
                    <label for="data">Data</label>
                    <input type="date" id="data" class="input-filtro">
                </div>

                <div class="grupo-filtro">
                    <label for="tipo">Tipo</label>
                    <select id="tipo" class="select-filtro">
                        <option disabled selected>Selecione uma opção</option>
                        <option>Entrada</option>
                        <option>Saída</option>
                    </select>
                </div>

                <div class="grupo-filtro pesquisar-nome">
                    <label for="pesquisarNome">Pesquisar item</label>
                    <input type="text" id="pesquisarNome" class="input-filtro" placeholder="Digite o nome do produto">
                </div>

                <div class="grupo-filtro botao-pesquisa">
                    <button type="button" id="btnPesquisar" class="btn-pesquisa">Pesquisar</button>
                </div>
            </section>

            <!-- TABELA -->
            <section class="tabela-wrapper">
                <table id="tabelaEstoque">
                    <thead>
                        <tr>
                            <th>Código de Barras</th>
                            <th>Nome</th>
                            <th>Fabricante</th>
                            <th>Marca</th>
                            <th>Quantidade</th>
                            <th>Valor unitário</th>
                            <th>Total</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr>
                            <td>123456789</td>
                            <td>Mouse</td>
                            <td>Logitech</td>
                            <td>Mx</td>
                            <td>15</td>
                            <td>R$150,00</td>
                            <td>R$2.250,00</td>
                        </tr>
                        <tr>
                            <td>987654321</td>
                            <td>Teclado</td>
                            <td>Logitech</td>
                            <td>MxC</td>
                            <td>10</td>
                            <td>R$300,00</td>
                            <td>R$3.000,00</td>
                        </tr>
                    </tbody>
                </table>
            </section>

            <!-- PAGINAÇÃO -->
            <footer>
                <section id="paginacao">
                    <div class="controle-paginacao">
                        <label for="pagina">Página</label>
                        <select id="pagina">
                            <option>1</option>
                            <option>2</option>
                            <option>3</option>
                            <option>4</option>
                        </select>
                    </div>
                    <div class="conteiner-btn">
                        <button type="button" id="btnVoltar">Voltar</button>
                        <button type="button" id="btnProximo">Próximo</button>
                    </div>
                </section>
            </footer>

        </main>
    </body>
</html>
