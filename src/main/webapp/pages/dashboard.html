<!DOCTYPE html>
<html>
    <head>
        <link rel="stylesheet" href="../css/reset.css"/>
        <link rel="stylesheet" href="../css/color.css"/>
        <link rel="stylesheet" href="../css/dashboard.css"/>
        <title>Dashboard</title>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
    </head>
    <body>
        <header id="header">
            <h1 id="tituloDashboard">Sistema de Estoque</h1>
            <nav>
                <ul>
                    <li><a href="#">Início</a></li>
                    <li><a href="#">Gerenciamento</a></li>
                    <li><a href="cadastroProdutos.html" class="btn-menu">Cadastro</a></li>
                    <li><a href="#" id="btnlogout">Sair</a></li>
                </ul>
            </nav>
        </header>

        <main>
            <section id="resumoEstoque">
                <div class="card-resumo">
                    <h2 class="titulo-card">Entrada</h2>
                    <p class="valor-card" id="cardEntrada">0</p>
                </div>
                <div class="card-resumo">
                    <h2 class="titulo-card">Saída</h2>
                    <p class="valor-card" id="cardSaida">0</p>
                </div>
                <div class="card-resumo">
                    <h2 class="titulo-card">Total</h2>
                    <p class="valor-card" id="cardTotal">0</p>
                </div>
            </section>

            <section id="filtro">
                <div class="grupo-filtro">
                    <label for="filtroData">Data</label>
                    <input type="date" id="filtroData" class="input-filtro">
                </div>
                <div class="grupo-filtro">
                    <label for="tipoMovimentacao">Tipo</label>
                    <select id="tipoMovimentacao" class="select-filtro">
                        <option value="">Selecione uma opção</option>
                        <option value="entrada">Entrada</option>
                        <option value="saida">Saída</option>
                    </select>
                </div>
                <div class="grupo-filtro pesquisar-nome">
                    <label for="pesquisarNome">Pesquisar item</label>
                    <input type="text" id="pesquisarNome" class="input-filtro" placeholder="Digite o nome do produto">
                </div>
                <div class="grupo-filtro botao-pesquisa">
                    <button type="button" id="btnPesquisar" class="btn-pesquisa">Pesquisar</button>
                </div>
            </section>

            <section class="tabela-wrapper">
                <table id="tabelaEstoque">
                    <thead>
                        <tr>
                            <th>Código de Barras</th>
                            <th>Nome</th>
                            <th>Fabricante</th>
                            <th>Marca</th>
                            <th>Qtd Fabricação</th>
                            <th>Vencimento</th>
                            <th>Quantidade</th>
                            <th>Valor unit.</th>
                            <th>Total</th>
                            <th>Status</th>
                        </tr>
                    </thead>
                    <tbody id="corpoTabela"></tbody>
                </table>
            </section>

            <footer>
                <section id="paginacao">
                    <div class="controle-paginacao">
                        <label for="pagina">Página</label>
                        <select id="pagina">
                            <option>1</option>
                            <option>2</option>
                            <option>3</option>
                            <option>4</option>
                        </select>
                    </div>
                    <div class="conteiner-btn">
                        <button type="button" id="btnVoltar">Voltar</button>
                        <button type="button" id="btnProximo">Próximo</button>
                    </div>
                </section>
            </footer>
        </main>

        <script src="../Js/dashboard.js"></script>
        <script src="../Js/filtro.js"></script>
        <script src="../Js/logout.js"></script>
    </body>
</html>
