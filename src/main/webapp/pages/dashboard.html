<!DOCTYPE html>
<html>
    <head>
        <link rel="stylesheet" href="../css/reset.css"/>
        <link rel="stylesheet" href="../css/color.css"/>
        <link rel="stylesheet" href="../css/dashboard.css"/>
        <title>Dashboard</title>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
    </head>
    <body>
        <header id="header">
            <h1 id="tituloDashboard">Sistema de Estoque</h1>
            <nav>
                <ul>
                    <li><a href="#">Início</a></li>
                    <li><a href="#">Gerenciamento</a></li>
                </ul>
            </nav>
           
        </header>  

        <main>
            <section id="resumoEstoque">
                <div>
                    <h2>Entrada</h2>
                    <p>100</p>
                </div>
                <div>
                    <h2>Saída</h2>
                    <p>80</p>
                </div>
                <div>
                    <h2>Total</h2>
                    <p>20</p>
                </div>
            </section>

            <!-- FILTROS -->
            <section class="filtros">
                <div>
                    <label for="data">Data</label>
                    <input type="date" id="data">
                </div>

                <div>
                    <label for="tipo">Tipo</label>
                    <select id="tipo">
                        <option disabled selected>Selecione uma opção</option>
                        <option>Entrada</option>
                        <option>Saída</option>
                    </select>
                </div>

                <div class="grupo-filtro pesquisar-nome">
                    <label for="pesquisarNome">Pesquisar item</label>
                    <input type="text" id="pesquisarNome" placeholder="Digite o nome do produto">
                </div>

                <div class="grupo-filtro botao-pesquisa">
                    <button type="button" id="btnPesquisar">Pesquisar</button>
                </div>
            </section>

            <!-- TABELA -->
            <section>
                <div>
                    <table>
                        <thead>
                            <tr>
                                <th>Código de Barras</th>
                                <th>Nome</th>
                                <th>Fabricante</th>
                                <th>Marca</th>
                                <th>Quantidade</th>
                                <th>Valor unitário</th>
                                <th>Total</th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr>
                                <td>123456789</td>
                                <td>Mouse</td>
                                <td>Logitech</td>
                                <td>Mx</td>
                                <td>15</td>
                                <td>R$150,00</td>
                                <td>R$2.250,00</td>
                            </tr>
                            <tr>
                                <td>987654321</td>
                                <td>Teclado</td>
                                <td>Logitech</td>
                                <td>MxC</td>
                                <td>10</td>
                                <td>R$300,00</td>
                                <td>R$3.000,00</td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </section>

            <!-- PAGINAÇÃO -->
            <footer>
                <section>
                    <div>
                        <label for="pagina">Página</label>
                        <select id="pagina">
                            <option>1</option>
                            <option>2</option>
                            <option>3</option>
                            <option>4</option>
                        </select>
                    </div>
                    <div>
                        <button type="button">Voltar</button>
                        <button type="button">Próximo</button>
                    </div>
                </section>
            </footer>

        </main>
    </body>
</html>
