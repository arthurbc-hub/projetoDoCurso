<!DOCTYPE html>
<html>
    <head>
        <link rel="stylesheet" href="../css/reset.css"/>
        <link rel="stylesheet" href="../css/color.css"/>
        <link rel="stylesheet" href="../css/cadastro.css"/>
        <title>Cadastro</title>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
    </head>
    <body>

        <header id="header">
            <h1 id="tituloDashboard">Sistema de Estoque</h1>
            <nav>
                <ul>
                    <li><a href="#">Início</a></li>
                    <li><a href="#">Gerenciamento</a></li> 
                </ul>
            </nav>
        </header>

        <main id="main">
            <form action="/cadastro" method="POST">
                <div class="container">

                    <div class="dadosPessoais">
                        <label for="namefirst">Nome</label>
                        <input type="text" id="namefirst" name="namefirst" placeholder="Digite seu nome"/>

                        <label for="sobrenome">Sobrenome</label>
                        <input type="text" id="sobrenome" name="sobrenome" placeholder="Digite seu sobrenome"/>

                        <label for="matricula">Matrícula</label>
                        <input type="text" id="matricula" name="matricula" placeholder="Digite sua matrícula"/>

                        <label for="cpf">CPF</label>
                        <input type="text" id="cpf" name="cpf" placeholder="Digite seu CPF"/>

                        <label for="sexo">Sexo</label>
                        <select id="sexo" name="sexo">
                            <option value="" disabled selected>Selecione o sexo</option>
                            <option value="1">Masculino</option>
                            <option value="2">Feminino</option>
                        </select>

                        <label for="dtaNascimento">Data de nascimento</label>
                        <input type="date" name="dtaNascimento" id="dtaNascimento"/>

                        <label for="email">E-mail</label>
                        <input type="email" id="email" name="email" placeholder="xxx@xxxx.com"/>

                        <label for="telefone">Telefone</label>
                        <input type="tel" name="telefone" id="telefone" placeholder="(00) 00000-0000"/>

                        <label for="usuario">Usuário</label>
                        <input type="text" name="usuario" id="usuario" placeholder="Digite nome de usuário"/>

                        <label for="senha">Senha</label>
                        <input type="password" name="senha" id="senha" placeholder="Digite sua senha"/>

                        <label for="funcao">Função</label>
                        <input type="text" name="funcao" id="funcao" placeholder="Digite sua função"/>
                    </div>

                    <div class="containerEndereco">
                        <label for="cep">CEP</label>
                        <input type="text" name="cep" id="cep"/>

                        <label for="endereco">Endereço</label>
                        <input type="text" name="endereco" id="endereco"/>

                        <label for="estado">Estado</label>
                        <input type="text" name="estado" id="estado"/>

                        <label for="cidade">Cidade</label>
                        <input type="text" name="cidade" id="cidade"/>

                        <label for="bairro">Bairro</label>
                        <input type="text" name="bairro" id="bairro"/>

                        <label for="numero">Número</label>
                        <input type="text" name="numero" id="numero"/>

                        <label for="complemento">Complemento</label>
                        <input type="text" name="complemento" id="complemento"/>
                    </div>

                    <div class="btn">
                        <button type="submit">Cadastrar</button>
                    </div>

                </div>
            </form> 
        </main>

        <script src="../Js/cep.js"></script>
    </body>
</html>
